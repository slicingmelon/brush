# Cross-platform addition (Tier-1; missing from the original bundled set).
'coreutils.pathchk' = ["dep:uu_pathchk"]

# Unix-only — `feat_require_unix_core` in upstream uutils. The dep crates
# live in `[target.'cfg(unix)'.dependencies]` below, so enabling these on
# Windows produces a Cargo dep-resolution error (intended: Windows users
# should enable `coreutils.all` rather than `coreutils.all-unix`).
'coreutils.chgrp' = ["dep:uu_chgrp"]
'coreutils.chmod' = ["dep:uu_chmod"]
'coreutils.chown' = ["dep:uu_chown"]
'coreutils.chroot' = ["dep:uu_chroot"]
'coreutils.groups' = ["dep:uu_groups"]
'coreutils.id' = ["dep:uu_id"]
'coreutils.install' = ["dep:uu_install"]
'coreutils.kill' = ["dep:uu_kill"]   # collides with brush's native kill builtin; register_builtin_if_unset keeps native winning
'coreutils.logname' = ["dep:uu_logname"]
'coreutils.mkfifo' = ["dep:uu_mkfifo"]
'coreutils.mknod' = ["dep:uu_mknod"]
'coreutils.nice' = ["dep:uu_nice"]
'coreutils.nohup' = ["dep:uu_nohup"]
'coreutils.stat' = ["dep:uu_stat"]
'coreutils.stty' = ["dep:uu_stty"]
'coreutils.timeout' = ["dep:uu_timeout"]
'coreutils.tty' = ["dep:uu_tty"]

# Unix-only — `feat_require_unix_utmpx` in upstream uutils.
'coreutils.pinky' = ["dep:uu_pinky"]
'coreutils.uptime' = ["dep:uu_uptime"]
'coreutils.users' = ["dep:uu_users"]
'coreutils.who' = ["dep:uu_who"]

# Unix-only — `feat_require_unix_hostid`. Subset of Unix; only some
# platforms provide `gethostid` in libc.
'coreutils.hostid' = ["dep:uu_hostid"]

# Linux-only — `feat_require_unix` extras (stdbuf uses a cdylib for
# LD_PRELOAD; not portable to musl or BSD/macOS).
'coreutils.stdbuf' = ["dep:uu_stdbuf"]

# Linux-only — `feat_require_selinux`. Requires libselinux at link time.
'coreutils.chcon' = ["dep:uu_chcon"]
'coreutils.runcon' = ["dep:uu_runcon"]

