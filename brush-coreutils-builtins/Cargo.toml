# Unix-only utilities. Gated at the target level so Windows builds with
# `coreutils.all` (cross-platform aggregate) don't try to compile crates
# that uutils itself ships only for Unix-class targets.
[target.'cfg(unix)'.dependencies]
# feat_require_unix_core
uu_chgrp = { version = "0.8.0", optional = true }
uu_chmod = { version = "0.8.0", optional = true }
uu_chown = { version = "0.8.0", optional = true }
uu_chroot = { version = "0.8.0", optional = true }
uu_groups = { version = "0.8.0", optional = true }
uu_id = { version = "0.8.0", optional = true }
uu_install = { version = "0.8.0", optional = true }
uu_kill = { version = "0.8.0", optional = true }
uu_logname = { version = "0.8.0", optional = true }
uu_mkfifo = { version = "0.8.0", optional = true }
uu_mknod = { version = "0.8.0", optional = true }
uu_nice = { version = "0.8.0", optional = true }
uu_nohup = { version = "0.8.0", optional = true }
uu_stat = { version = "0.8.0", optional = true }
uu_stty = { version = "0.8.0", optional = true }
uu_timeout = { version = "0.8.0", optional = true }
uu_tty = { version = "0.8.0", optional = true }
# feat_require_unix_utmpx
uu_pinky = { version = "0.8.0", optional = true }
uu_uptime = { version = "0.8.0", optional = true }
uu_users = { version = "0.8.0", optional = true }
uu_who = { version = "0.8.0", optional = true }
# feat_require_unix_hostid
uu_hostid = { version = "0.8.0", optional = true }

# Linux-only utilities. stdbuf uses a cdylib (LD_PRELOAD) that doesn't
# build on musl or non-Linux Unixes; chcon/runcon require libselinux.
[target.'cfg(target_os = "linux")'.dependencies]
uu_stdbuf = { version = "0.8.0", optional = true }
uu_chcon = { version = "0.8.0", optional = true }
uu_runcon = { version = "0.8.0", optional = true }
