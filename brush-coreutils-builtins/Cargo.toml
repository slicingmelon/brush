[package]
name = "brush-coreutils-builtins"
description = "Optional coreutils builtins for brush-shell (powered by uutils/coreutils)"
version = "0.1.0"
categories.workspace = true
edition.workspace = true
keywords.workspace = true
license.workspace = true
readme.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
bench = false

[features]
# No utilities are enabled by default, so plain `cargo build --workspace`
# pays only for the scaffolding. Consumers opt into the full set by enabling
# `coreutils.all` (or individual `coreutils.<name>` features).
#
# Aggregate features:
#   * `coreutils.all`       — every utility that builds on every Tier-1
#                             target (Linux, macOS, Windows).
#   * `coreutils.all-unix`  — `coreutils.all` plus utilities that uutils
#                             gates with `feat_require_unix_core` /
#                             `feat_require_unix_utmpx` /
#                             `feat_require_unix_hostid`. Builds only on
#                             Unix targets — enabling on Windows triggers
#                             a Cargo error because the Unix-only `uu_*`
#                             deps live in a `cfg(unix)` target table.
#   * `coreutils.all-linux` — `coreutils.all-unix` plus utilities that
#                             require Linux specifically (`stdbuf` uses
#                             a cdylib for `LD_PRELOAD`; `chcon`/`runcon`
#                             need libselinux).
default = []

'coreutils.all' = [
    'coreutils.arch',
    'coreutils.base32',
    'coreutils.base64',
    'coreutils.basename',
    'coreutils.basenc',
    'coreutils.cat',
    'coreutils.cksum',
    'coreutils.b2sum',
    'coreutils.md5sum',
    'coreutils.sha1sum',
    'coreutils.sha224sum',
    'coreutils.sha256sum',
    'coreutils.sha384sum',
    'coreutils.sha512sum',
    'coreutils.comm',
    'coreutils.cp',
    'coreutils.csplit',
    'coreutils.cut',
    'coreutils.date',
    'coreutils.dd',
    'coreutils.df',
    'coreutils.dir',
    'coreutils.dircolors',
    'coreutils.dirname',
    'coreutils.du',
    'coreutils.echo',
    'coreutils.env',
    'coreutils.expand',
    'coreutils.expr',
    'coreutils.factor',
    'coreutils.false',
    'coreutils.fmt',
    'coreutils.fold',
    'coreutils.head',
    'coreutils.hostname',
    'coreutils.join',
    'coreutils.link',
    'coreutils.ln',
    'coreutils.ls',
    'coreutils.mkdir',
    'coreutils.mktemp',
    'coreutils.more',
    'coreutils.mv',
    'coreutils.nl',
    'coreutils.nproc',
    'coreutils.numfmt',
    'coreutils.od',
    'coreutils.paste',
    'coreutils.pathchk',
    'coreutils.pr',
    'coreutils.printenv',
    'coreutils.printf',
    'coreutils.ptx',
    'coreutils.pwd',
    'coreutils.readlink',
    'coreutils.realpath',
    'coreutils.rm',
    'coreutils.rmdir',
    'coreutils.seq',
    'coreutils.shred',
    'coreutils.shuf',
    'coreutils.sleep',
    'coreutils.sort',
    'coreutils.split',
    'coreutils.sum',
    'coreutils.sync',
    'coreutils.tac',
    'coreutils.tail',
    'coreutils.tee',
    'coreutils.test',
    'coreutils.touch',
    'coreutils.tr',
    'coreutils.true',
    'coreutils.truncate',
    'coreutils.tsort',
    'coreutils.uname',
    'coreutils.unexpand',
    'coreutils.uniq',
    'coreutils.unlink',
    'coreutils.vdir',
    'coreutils.wc',
    'coreutils.whoami',
    'coreutils.yes',
]

'coreutils.all-unix' = [
    'coreutils.all',
    # feat_require_unix_core
    'coreutils.chgrp',
    'coreutils.chmod',
    'coreutils.chown',
    'coreutils.chroot',
    'coreutils.groups',
    'coreutils.id',
    'coreutils.install',
    'coreutils.kill',
    'coreutils.logname',
    'coreutils.mkfifo',
    'coreutils.mknod',
    'coreutils.nice',
    'coreutils.nohup',
    'coreutils.stat',
    'coreutils.stty',
    'coreutils.timeout',
    'coreutils.tty',
    # feat_require_unix_utmpx
    'coreutils.pinky',
    'coreutils.uptime',
    'coreutils.users',
    'coreutils.who',
    # feat_require_unix_hostid
    'coreutils.hostid',
]

'coreutils.all-linux' = [
    'coreutils.all-unix',
    # feat_require_unix (adds stdbuf on top of feat_require_unix_core)
    'coreutils.stdbuf',
    # feat_require_selinux
    'coreutils.chcon',
    'coreutils.runcon',
]

