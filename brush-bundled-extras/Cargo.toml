[package]
name = "brush-bundled-extras"
description = "Adapter wrappers for non-uutils-coreutils utilities bundled into brush-shell (findutils/diffutils/procps/grep/sed/awk as available)"
version = "0.1.1"
categories.workspace = true
edition.workspace = true
keywords.workspace = true
license.workspace = true
readme.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
bench = false

[features]
# No utilities are enabled by default. Consumers opt into individual
# utilities (`extras.find`, `extras.xargs`, ...), source-grouped
# aggregates (`extras.findutils-all`, ...), or the top-level aggregate
# (`extras.all`).
default = []

# Per-utility features (findutils 0.8.0).
'extras.find' = ["dep:findutils"]
'extras.xargs' = ["dep:findutils"]

# Per-utility features (uutils/sed 0.1.1).
'extras.sed' = ["dep:sed"]

# Source-grouped aggregates.
'extras.findutils-all' = [
    'extras.find',
    'extras.xargs',
]
'extras.uutils-sed-all' = [
    'extras.sed',
]

# Top-level aggregate. Layers in everything the cycle has wired so far —
# currently findutils (Cycle 2) and uutils/sed (posixutils-rs-integration
# Cycle 0a). diffutils (Cycle 3), procps (Cycle 4), grep (0b), and awk
# (0c) extend this set as they land.
'extras.all' = [
    'extras.findutils-all',
    'extras.uutils-sed-all',
]

[lints]
workspace = true

[dependencies]
findutils = { version = "0.8.0", optional = true }
# uutils/sed exposes the standard `uumain` shape via `sed::sed::uumain`;
# uucore version (0.8.0) matches brush-coreutils-builtins, so the dep
# graph stays single-version. See
# `docs/planning/posixutils-rs-integration.md` Cycle 0a.
sed = { version = "0.1.1", optional = true }
